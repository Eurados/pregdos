name: SLURM Docker

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build SLURM image
        run: docker build -t pregdos-slurm -f docker/slurm/Dockerfile .

      - name: Start container
        run: |
          docker run -d --name slurm-test --hostname localhost pregdos-slurm tail -f /dev/null
          sleep 5

      - name: Check sinfo shows idle node
        run: docker exec slurm-test sinfo | grep -q "idle"

      - name: Test srun
        run: |
          docker exec slurm-test su slurm -s /bin/bash -c 'srun hostname' | grep -q "localhost"

      - name: Test sbatch
        run: |
          docker exec slurm-test su slurm -s /bin/bash -c 'sbatch -o /tmp/slurm-%j.out --wrap="hostname"'
          sleep 10
          docker exec slurm-test sh -c 'cat /tmp/slurm-*.out' | grep -q "localhost"

      - name: Stop container
        if: always()
        run: docker rm -f slurm-test