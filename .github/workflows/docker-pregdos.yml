name: Build and publish pregdos
on:
  workflow_run:
    workflows: ["Build OpenTOPAS base image"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_heavy:
        description: "Run heavy image build/publish"
        type: boolean
        required: true
        default: false
      topas_version:
        description: "TOPAS version to build"
        type: choice
        required: true
        default: all
        options:
          - all
          - "4.0.0"
          - "4.2.3"

jobs:
  build:
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'release') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_heavy == true)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        topas_version: ["4.0.0", "4.2.3"]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Normalize image owner
        id: owner
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.0
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: |
          github.event_name == 'workflow_run' ||
          inputs.topas_version == 'all' ||
          inputs.topas_version == matrix.topas_version
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/pregdos/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/pregdos:${{ github.event_name == 'workflow_run' && format('{0}-topas{1}', github.event.workflow_run.head_branch, matrix.topas_version) || format('manual-{0}-topas{1}', github.run_number, matrix.topas_version) }}
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/pregdos:latest-topas${{ matrix.topas_version }}
          build-args: |
            OPENTOPAS_IMAGE=ghcr.io/${{ steps.owner.outputs.owner_lc }}/pregdos-base-opentopas-v${{ matrix.topas_version }}:latest
            PREGDOS_VERSION=${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || format('0+manual.{0}', github.run_number) }}

      - name: Delete old package versions
        if: matrix.topas_version == '4.0.0'
        uses: actions/delete-package-versions@v5
        with:
          package-name: pregdos
          package-type: container
          min-versions-to-keep: 2
          delete-only-untagged-versions: false
