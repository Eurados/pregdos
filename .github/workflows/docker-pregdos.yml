name: Build and publish pregdos

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      run_heavy:
        description: "Run heavy image build/publish"
        type: boolean
        required: true
        default: false

jobs:
  build:
    if: github.event_name == 'release' || inputs.run_heavy == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.0
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pregdos
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=manual-${{ github.run_number }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/pregdos/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENTOPAS_IMAGE=ghcr.io/${{ github.repository_owner }}/pregdos-opentopas-v4.0.0:latest
            PREGDOS_VERSION=${{ github.event_name == 'release' && github.event.release.tag_name || format('0+manual.{0}', github.run_number) }}

      - name: Delete old package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: pregdos
          package-type: container
          min-versions-to-keep: 2
          delete-only-untagged-versions: false
