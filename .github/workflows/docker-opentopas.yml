name: Build OpenTOPAS base image
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      run_heavy:
        description: "Run heavy image build/publish"
        type: boolean
        required: true
        default: false
      version:
        description: 'OpenTOPAS version to build (e.g. 4.0.0 or 4.2.3)'
        type: choice
        required: true
        default: '4.0.0'
        options:
          - '4.0.0'
          - '4.2.3'

jobs:
  build:
    if: github.event_name == 'release' || inputs.run_heavy == true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        opentopas_version: ${{ github.event_name == 'release' && fromJson('["4.0.0","4.2.3"]') || fromJson(format('["{0}"]', inputs.version)) }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Normalize image owner
        id: owner
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.0
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/opentopas/${{ matrix.opentopas_version }}/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner_lc }}/pregdos-base-opentopas-v${{ matrix.opentopas_version }}:latest
