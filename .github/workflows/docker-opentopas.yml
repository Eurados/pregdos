name: Build OpenTOPAS base image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      run_heavy:
        description: "Run heavy image build/publish"
        type: boolean
        required: true
        default: false
      version:
        description: 'OpenTOPAS version to build (e.g. 4.0.0 or 4.2.3)'
        type: choice
        required: true
        default: '4.0.0'
        options:
          - '4.0.0'
          - '4.2.3'

jobs:
  build:
    if: github.event_name == 'release' || inputs.run_heavy == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      OPENTOPAS_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '4.0.0' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/opentopas/${{ env.OPENTOPAS_VERSION }}/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pregdos-opentopas-v${{ env.OPENTOPAS_VERSION }}:latest
