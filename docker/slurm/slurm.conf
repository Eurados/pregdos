# /etc/slurm/slurm.conf
ClusterName=slurm-docker
SlurmctldHost=localhost
SlurmUser=slurm
SlurmdUser=slurm

SlurmctldPort=6817
SlurmdPort=6818

# Select plugin & accounting (no DB)
SelectType=select/cons_tres
SelectTypeParameters=CR_Core_Memory
AccountingStorageType=accounting_storage/none
JobCompType=jobcomp/none

# cgroup v2 path: use task/cgroup + proctrack/cgroup
# TaskPlugin=task/cgroup
TaskPlugin=task/affinity
# ProctrackType=proctrack/cgroup
ProctrackType=proctrack/linuxproc

MpiDefault=none
ReturnToService=2
StateSaveLocation=/var/spool/slurm
SlurmctldTimeout=120
SlurmdTimeout=300

# Placeholder values patched by entrypoint:
# (RealMemory is filled from /proc/meminfo; CPUs from nproc)
NodeName=localhost CPUs=__NPROC__ RealMemory=1000 State=UNKNOWN
PartitionName=defq Nodes=localhost Default=YES MaxTime=INFINITE State=UP
