<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Structures · PregDos</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,'Helvetica Neue',Arial,'Noto Sans','Apple Color Emoji','Segoe UI Emoji','Segoe UI Symbol','Noto Color Emoji',sans-serif}</style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Select Structures</h1>
      <p class="subtitle">Hold Ctrl (Cmd on Mac) to select multiple structures</p>
    </div>
  </header>

  <main class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert">
          <ul>
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
          </ul>
        </div>
      {% endif %}
    {% endwith %}

    <section class="card">
      <form method="post" action="{{ url_for('convert') }}" class="form-grid">
        <div class="form-row">
          <label for="structures">Structures</label>
          <select id="structures" name="structures" multiple size="12" class="multiselect">
            {% for s in structures %}
              <option value="{{ s }}">{{ s }}</option>
            {% endfor %}
          </select>
          <small class="hint">Select one or more structures to include.</small>
        </div>

        <input type="hidden" name="study_dir" value="{{ study_dir }}" />
        <input type="hidden" name="beam_model_path" value="{{ beam_model_path }}" />
        <input type="hidden" name="spr_table_path" value="{{ spr_table_path }}" />

        <div class="actions">
          <a class="btn" href="{{ url_for('upload_files') }}">Back</a>
          <button type="submit" class="btn primary">Convert</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
