# --- cluster basics ---
ClusterName=PregDos_Container
SlurmctldHost=localhost
ReturnToService=1

# --- scheduling ---
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_CPU

# --- logging/accounting (off for container) ---
AccountingStorageType=accounting_storage/none
JobCompType=jobcomp/none
JobAcctGatherType=jobacct_gather/none

# --- proctracking/tasks (no cgroups in plain containers) ---
ProctrackType=proctrack/linuxproc
TaskPlugin=task/none

# --- timeouts ---
SlurmctldTimeout=120
SlurmdTimeout=300
MinJobAge=300
KillWait=30

# --- state/spool (simple defaults under /var/spool/slurm) ---
StateSaveLocation=/var/spool/slurm/ctld
SlurmdSpoolDir=/var/spool/slurm/d
SlurmUser=slurm

# --- nodes/partitions (CPUs auto from container) ---
NodeName=localhost CPUs=28 State=UNKNOWN
PartitionName=testing Nodes=localhost Default=YES MaxTime=INFINITE State=UP
